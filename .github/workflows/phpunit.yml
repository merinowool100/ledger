name: PHP Unit Tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v4
        with:
          php-version: '8.1'
          extensions: sqlite, pdo_sqlite

      - name: Install composer dependencies
        run: composer install --no-progress --no-suggest --prefer-dist

      - name: Prepare environment
        run: |
          cp .env.example .env || true
          php -r "file_put_contents('.env', str_replace(['DB_CONNECTION=mysql','DB_DATABASE=laravel'], ['DB_CONNECTION=sqlite','DB_DATABASE=:memory:'], file_get_contents('.env')));"
          php artisan key:generate --ansi

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test --no-tty --coverage-text
